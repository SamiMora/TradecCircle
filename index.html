<!DOCTYPE html>
<html>
<head>
  <title>TradeCircle 🌌</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to bottom, #ffffff, #f8fafc);
      color: #0f172a;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 2.5em;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 12px;
      width: 250px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    input, select {
      margin: 5px;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      background: #f97316;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #ea580c;
    }

    #filters button {
      background: #0ea5e9;
    }

    #searchInput {
      width: 250px;
      border: 1px solid #ccc;
    }

    .logo {
      width: 100px;
    }

    .trade { color: #f97316; }
    .circle { color: #0ea5e9; }
  </style>
</head>

<body>

<img src="tradecircle-logo.png" class="logo" />
<h1><span class="trade">Trade</span><span class="circle">Circle</span></h1>

<!-- AUTH -->
<div id="authSection">
  <h2>Login / Signup</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <br>
  <select id="role">
    <option value="customer">Customer</option>
    <option value="business">Business</option>
  </select>
  <br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="appSection" style="display:none;">
  <button onclick="logout()">Logout</button>

  <input id="searchInput" placeholder="Search..." onkeyup="searchServices()"/>

  <div id="filters">
    <button onclick="filterServices('All')">All</button>
    <button onclick="filterServices('Hair')">Hair</button>
    <button onclick="filterServices('Auto')">Auto</button>
  </div>

  <div class="container" id="serviceList"></div>

  <!-- BUSINESS PROFILE DISPLAY -->
  <div id="profileView" style="display:none;">
    <h2 id="profileName"></h2>
    <p id="profileDesc"></p>
    <p id="profileContact"></p>
    <button onclick="closeProfile()">Back</button>
  </div>

  <!-- ADD SERVICE -->
  <div id="addServiceSection" style="display:none;">
    <h3>Add Service</h3>
    <input id="name" placeholder="Service name">
    <input id="price" placeholder="Price">
    <input id="category" placeholder="Category">
    <input type="file" id="image">
    <button onclick="addService()">Add</button>
  </div>

  <!-- BUSINESS PROFILE -->
  <div id="businessProfileSection" style="display:none;">
    <h3>Business Profile</h3>
    <input id="bizName" placeholder="Business Name">
    <input id="bizContact" placeholder="Contact">
    <input id="bizDescription" placeholder="Description">
    <button onclick="saveBusinessProfile()">Save</button>
  </div>
</div>

<script>
const BASE_URL = "https://tradeccircle-api.onrender.com";
const API_URL = BASE_URL + "/services";

let allServices = [];
let currentUser = null;
let token = localStorage.getItem("token");

// Decode user
function decodeUser() {
  try {
    return token ? JSON.parse(atob(token.split(".")[1])) : null;
  } catch {
    return null;
  }
}

// AUTH
function checkAuth() {
  token = localStorage.getItem("token");
  currentUser = decodeUser();

  const authSection = document.getElementById("authSection");
  const appSection = document.getElementById("appSection");
  const addServiceSection = document.getElementById("addServiceSection");
  const businessProfileSection = document.getElementById("businessProfileSection");

  if (token && currentUser) {
    authSection.style.display = "none";
    appSection.style.display = "block";

    // 🔒 ALWAYS hide first (prevents leaks)
    addServiceSection.style.display = "none";
    businessProfileSection.style.display = "none";

    // ✅ ONLY show for business accounts
    if (currentUser.role === "business") {
      addServiceSection.style.display = "block";
      businessProfileSection.style.display = "block";
    }

    loadServices();
  } else {
    authSection.style.display = "block";
    appSection.style.display = "none";
  }
}

async function signup() {
  const res = await fetch(BASE_URL + "/signup", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value,
      role: role.value
    })
  });

  alert((await res.json()).message);
}

async function login() {
  const res = await fetch(BASE_URL + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    checkAuth();
  }
}

function logout() {
  localStorage.removeItem("token");
  checkAuth();
}

// BUSINESS
async function saveBusinessProfile() {
  await fetch(BASE_URL + "/business-profile", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify({
      name: bizName.value,
      contact: bizContact.value,
      description: bizDescription.value
    })
  });

  alert("Saved ✅");
}

// LOAD
async function loadServices() {
  const res = await fetch(API_URL);
  allServices = await res.json();
  displayServices(allServices);
}

async function displayServices(services) {
  const res = await fetch(BASE_URL + "/business-profiles");
  const businesses = await res.json();

  serviceList.innerHTML = "";

  services.forEach(s => {
    const biz = businesses.find(b => b.userId === s.userId);

    serviceList.innerHTML += `
      <div class="card" onclick="openBusiness(${s.userId})">
        <h3>${s.name}</h3>
        <p>$${s.price}</p>
        <p>${s.category}</p>
        <p>⭐ ${s.rating}</p>
        <p><b>${biz ? biz.name : "Unknown"}</b></p>

        ${currentUser?.id === s.userId ? `
          <button onclick="event.stopPropagation(); editService(${s.id})">Edit</button>
          <button onclick="event.stopPropagation(); deleteService(${s.id})">Delete</button>
        ` : ""}
      </div>
    `;
  });
}

// ACTIONS
async function addService() {
  await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify({
      name: name.value,
      price: price.value,
      category: category.value
    })
  });

  loadServices();
}

async function editService(id) {
  const nameVal = prompt("New name:");
  const priceVal = prompt("New price:");

  await fetch(API_URL + "/" + id, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify({ name: nameVal, price: priceVal })
  });

  loadServices();
}

async function deleteService(id) {
  await fetch(API_URL + "/" + id, {
    method: "DELETE",
    headers: {
      "Authorization": `Bearer ${token}`
    }
  });

  loadServices();
}

function openBusiness(userId) {
  fetch(BASE_URL + "/business-profiles")
    .then(r => r.json())
    .then(data => {
      const b = data.find(x => x.userId === userId);
      if (b) {
        alert(`🏪 ${b.name}\n📞 ${b.contact}\n📝 ${b.description}`);
      }
    });
}

// INIT
checkAuth();
</script>
</body>
