<!DOCTYPE html>
<html>
<head>
  <title>TradeCircle 🌌</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to bottom, #ffffff, #f8fafc);
      color: #0f172a;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 2.5em;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 12px;
      width: 250px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    input, select {
      margin: 5px;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      background: #f97316;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #ea580c;
    }

    #filters button {
      background: #0ea5e9;
    }

    #searchInput {
      width: 250px;
      border: 1px solid #ccc;
    }

    .logo {
      width: 100px;
    }

    .trade { color: #f97316; }
    .circle { color: #0ea5e9; }
  </style>
</head>

<body>

<img src="tradecircle-logo.png" class="logo" />
<h1><span class="trade">Trade</span><span class="circle">Circle</span></h1>

<!-- AUTH -->
<div id="authSection">
  <h2>Login / Signup</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <br>
  <select id="role">
    <option value="customer">Customer</option>
    <option value="business">Business</option>
  </select>
  <br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="appSection" style="display:none;">
  <button onclick="logout()">Logout</button>

  <input id="searchInput" placeholder="Search..." onkeyup="searchServices()"/>

  <div id="filters">
    <button onclick="filterServices('All')">All</button>
    <button onclick="filterServices('Hair')">Hair</button>
    <button onclick="filterServices('Auto')">Auto</button>
  </div>

  <div class="container" id="serviceList"></div>

  <!-- BUSINESS PROFILE DISPLAY -->
  <div id="profileView" style="display:none;">
    <h2 id="profileName"></h2>
    <p id="profileDesc"></p>
    <p id="profileContact"></p>
    <button onclick="closeProfile()">Back</button>
  </div>

  <!-- ADD SERVICE -->
  <div id="addServiceSection" style="display:none;">
    <h3>Add Service</h3>
    <input id="name" placeholder="Service name">
    <input id="price" placeholder="Price">
    <input id="category" placeholder="Category">
    <input type="file" id="image">
    <button onclick="addService()">Add</button>
  </div>

  <!-- BUSINESS PROFILE -->
  <div id="businessProfileSection" style="display:none;">
    <h3>Business Profile</h3>
    <input id="bizName" placeholder="Business Name">
    <input id="bizContact" placeholder="Contact">
    <input id="bizDescription" placeholder="Description">
    <button onclick="saveBusinessProfile()">Save</button>
  </div>
</div>

<script>
const BASE_URL = "https://tradeccircle-api.onrender.com";

let token = localStorage.getItem("token");
let currentUser = null;
let allServices = [];
let businesses = [];

// Decode user
function decodeUser() {
  if (!token) return null;
  return JSON.parse(atob(token.split(".")[1]));
}

// AUTH CHECK
function checkAuth() {
  const authSection = document.getElementById("authSection");
  const appSection = document.getElementById("appSection");

  token = localStorage.getItem("token");
  currentUser = decodeUser();

  if (token && currentUser) {
    authSection.style.display = "none";
    appSection.style.display = "block";

    if (currentUser.role === "business") {
      document.getElementById("addServiceSection").style.display = "block";
      document.getElementById("businessProfileSection").style.display = "block";
    }

    loadAll();
  } else {
    authSection.style.display = "block";
    appSection.style.display = "none";
  }
}

// LOAD EVERYTHING
async function loadAll() {
  const s = await fetch(BASE_URL + "/services");
  allServices = await s.json();

  const b = await fetch(BASE_URL + "/business-profiles");
  businesses = await b.json();

  displayServices(allServices);
}

// DISPLAY SERVICES
function displayServices(services) {
  const list = document.getElementById("serviceList");
  list.innerHTML = "";

  services.forEach(service => {
    const biz = businesses.find(b => b.userId === service.userId);

    list.innerHTML += `
      <div class="card" onclick="openProfile(${service.userId})">
        <img src="${service.image || 'tradecircle-logo.png'}"/>
        <h3>${service.name}</h3>
        <p>$${service.price}</p>
        <p>${service.category}</p>
        <p><b>${biz ? biz.name : "Unknown Business"}</b></p>
      </div>
    `;
  });
}

// OPEN PROFILE
function openProfile(userId) {
  const biz = businesses.find(b => b.userId === userId);
  if (!biz) return;

  document.getElementById("profileView").style.display = "block";
  document.getElementById("serviceList").style.display = "none";

  document.getElementById("profileName").innerText = biz.name;
  document.getElementById("profileDesc").innerText = biz.description;
  document.getElementById("profileContact").innerText = biz.contact;
}

function closeProfile() {
  document.getElementById("profileView").style.display = "none";
  document.getElementById("serviceList").style.display = "flex";
}

// AUTH
async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const role = document.getElementById("role").value;

  const res = await fetch(BASE_URL + "/signup", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({email,password,role})
  });

  const data = await res.json();
  alert(data.message || data.error);
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(BASE_URL + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({email,password})
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    checkAuth();
  }
}

function logout() {
  localStorage.removeItem("token");
  checkAuth();
}

// ADD SERVICE
async function addService() {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const category = document.getElementById("category").value;

  await fetch(BASE_URL + "/services", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body: JSON.stringify({name,price,category})
  });

  loadAll();
}

// SAVE PROFILE
async function saveBusinessProfile() {
  const name = document.getElementById("bizName").value;
  const contact = document.getElementById("bizContact").value;
  const description = document.getElementById("bizDescription").value;

  await fetch(BASE_URL + "/business-profile", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body: JSON.stringify({name,contact,description})
  });

  loadAll();
}

// SEARCH
function searchServices() {
  const input = document.getElementById("searchInput").value.toLowerCase();

  const filtered = allServices.filter(s =>
    s.name.toLowerCase().includes(input) ||
    s.category.toLowerCase().includes(input)
  );

  displayServices(filtered);
}

// FILTER
function filterServices(category) {
  if (category === "All") return displayServices(allServices);
  displayServices(allServices.filter(s => s.category === category));
}

// INIT
checkAuth();
</script>

</body>
</html>
