<!DOCTYPE html>
<html>
<head>
  <title>TradeCircle 🌌</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to bottom, #ffffff, #f8fafc);
      text-align: center;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 12px;
      width: 250px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    input {
      margin: 5px;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: #f97316;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h1>TradeCircle 🌌</h1>

<input id="searchInput" placeholder="Search..." onkeyup="searchServices()" />

<div class="container" id="serviceList"></div>

<h2>Add Service</h2>
<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="category" placeholder="Category">
<input type="file" id="image">
<br>
<button onclick="addService()">Add</button>

<script>

const API_URL = "https://tradecircle-api.onrender.com/services";
let allServices = [];


// ================= LOAD =================
async function loadServices() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    allServices = data;
    displayServices(data);

  } catch (err) {
    console.error("LOAD ERROR:", err);
  }
}


// ================= DISPLAY =================
function displayServices(services) {
  const list = document.getElementById("serviceList");
  list.innerHTML = "";

  services.forEach(service => {
    list.innerHTML += `
      <div class="card">
        <img src="${service.image || ''}">
        <h3>${service.name}</h3>
        <p>$${service.price}</p>
        <p>${service.category}</p>

        <button onclick="deleteService(${service.id})">Delete</button>
        <button onclick="editService(${service.id})">Edit</button>
      </div>
    `;
  });
}


// ================= ADD =================
async function addService() {

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const category = document.getElementById("category").value;
  const file = document.getElementById("image").files[0];

  let image = "";

  if (file) {
    const reader = new FileReader();

    reader.onloadend = async function () {
      image = reader.result;
      await saveService(name, price, category, image);
    };

    reader.readAsDataURL(file);
  } else {
    await saveService(name, price, category, image);
  }
}


// ================= SAVE =================
async function saveService(name, price, category, image) {

  try {

    if (window.editingId) {

      await fetch(`${API_URL}/${window.editingId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, price, category, image })
      });

      window.editingId = null;

    } else {

      await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, price, category, image })
      });

    }

  } catch (err) {
    console.error("SAVE ERROR:", err);
  }
}


// ================= DELETE =================
async function deleteService(id) {

  try {
    await fetch(`${API_URL}/${id}`, {
      method: "DELETE"
    });

  } catch (err) {
    console.error("DELETE ERROR:", err);
  }
}


// ================= EDIT =================
function editService(id) {
  const service = allServices.find(s => s.id === id);

  document.getElementById("name").value = service.name;
  document.getElementById("price").value = service.price;
  document.getElementById("category").value = service.category;

  window.editingId = id;
}


// ================= SEARCH =================
function searchServices() {
  const input = document.getElementById("searchInput").value.toLowerCase();

  const filtered = allServices.filter(s =>
    s.name.toLowerCase().includes(input) ||
    s.category.toLowerCase().includes(input)
  );

  displayServices(filtered);
}


// INIT
loadServices();

</script>

</body>
</html>
