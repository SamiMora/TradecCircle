<script>
const BASE_URL = "https://tradeccircle-api.onrender.com";
const API_URL = BASE_URL + "/services";

let allServices = [];
let currentUser = null;
let token = localStorage.getItem("token");

// Decode user
function decodeUser() {
  try {
    return token ? JSON.parse(atob(token.split(".")[1])) : null;
  } catch {
    return null;
  }
}

// AUTH
function checkAuth() {
  token = localStorage.getItem("token");
  currentUser = decodeUser();

  authSection.style.display = token ? "none" : "block";
  appSection.style.display = token ? "block" : "none";

  if (currentUser?.role === "business") {
    addServiceSection.style.display = "block";
    businessProfileSection.style.display = "block";
  }

  loadServices();
}

async function signup() {
  const res = await fetch(BASE_URL + "/signup", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value,
      role: role.value
    })
  });

  alert((await res.json()).message);
}

async function login() {
  const res = await fetch(BASE_URL + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    checkAuth();
  }
}

function logout() {
  localStorage.removeItem("token");
  checkAuth();
}

// BUSINESS
async function saveBusinessProfile() {
  await fetch(BASE_URL + "/business-profile", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify({
      name: bizName.value,
      contact: bizContact.value,
      description: bizDescription.value
    })
  });

  alert("Saved ✅");
}

// LOAD
async function loadServices() {
  const res = await fetch(API_URL);
  allServices = await res.json();
  displayServices(allServices);
}

async function displayServices(services) {
  const res = await fetch(BASE_URL + "/business-profiles");
  const businesses = await res.json();

  serviceList.innerHTML = "";

  services.forEach(s => {
    const biz = businesses.find(b => b.userId === s.userId);

    serviceList.innerHTML += `
      <div class="card" onclick="openBusiness(${s.userId})">
        <h3>${s.name}</h3>
        <p>$${s.price}</p>
        <p>${s.category}</p>
        <p>⭐ ${s.rating}</p>
        <p><b>${biz ? biz.name : "Unknown"}</b></p>

        ${currentUser?.id === s.userId ? `
          <button onclick="event.stopPropagation(); editService(${s.id})">Edit</button>
          <button onclick="event.stopPropagation(); deleteService(${s.id})">Delete</button>
        ` : ""}
      </div>
    `;
  });
}

// ACTIONS
async function addService() {
  await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify({
      name: name.value,
      price: price.value,
      category: category.value
    })
  });

  loadServices();
}

async function editService(id) {
  const nameVal = prompt("New name:");
  const priceVal = prompt("New price:");

  await fetch(API_URL + "/" + id, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify({ name: nameVal, price: priceVal })
  });

  loadServices();
}

async function deleteService(id) {
  await fetch(API_URL + "/" + id, {
    method: "DELETE",
    headers: {
      "Authorization": `Bearer ${token}`
    }
  });

  loadServices();
}

function openBusiness(userId) {
  fetch(BASE_URL + "/business-profiles")
    .then(r => r.json())
    .then(data => {
      const b = data.find(x => x.userId === userId);
      if (b) {
        alert(`🏪 ${b.name}\n📞 ${b.contact}\n📝 ${b.description}`);
      }
    });
}

// INIT
checkAuth();
</script>
