<!DOCTYPE html>
<html>
<head>
  <title>TradeCircle 🌌</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to bottom, #ffffff, #f8fafc);
      color: #0f172a;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 2.5em;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 12px;
      width: 250px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    input, select {
      margin: 5px;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      background: #f97316;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #ea580c;
      opacity: 0.9;
    }

    #filters {
      margin: 20px;
    }

    #filters button {
      background: #0ea5e9;
    }

    #filters button:hover {
      background: #0284c7;
    }

    #searchInput {
      width: 250px;
      border: 1px solid #ccc;
    }

    .logo-container {
      margin-top: 20px;
    }

    .logo {
      width: 100px;
      margin-bottom: 10px;
    }

    .trade { color: #f97316; }
    .circle { color: #0ea5e9; }
  </style>
</head>

<body>

<div class="logo-container">
  <img src="tradecircle-logo.png" class="logo" />
  <h1>
    <span class="trade">Trade</span><span class="circle">Circle</span>
  </h1>
</div>

<!-- AUTH -->
<div id="authSection">
  <h2>Login / Signup</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <br>
  <select id="role">
    <option value="customer">Customer</option>
    <option value="business">Business</option>
  </select>

  <br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="appSection" style="display:none;">

  <button onclick="logout()">Logout</button>

  <input id="searchInput" placeholder="Search services..." onkeyup="searchServices()" />

  <div id="filters">
    <button onclick="filterServices('All')">All</button>
    <button onclick="filterServices('Hair')">Hair</button>
    <button onclick="filterServices('Auto')">Auto</button>
    <button onclick="filterServices('Photography')">Photography</button>
  </div>

  <div>
    <button onclick="showAll()">🌍 All Services</button>
    <button onclick="showMine()">👤 My Services</button>
  </div>

  <div class="container" id="serviceList"></div>

  <!-- ADD SERVICE -->
  <div id="addServiceSection" style="display:none;">
    <h2>Add Service</h2>
    <input id="name" placeholder="Service name">
    <input id="price" placeholder="Price">
    <input id="category" placeholder="Category">
    <input type="file" id="image">
    <br>
    <button onclick="addService()">Add</button>
  </div>

  <!-- BUSINESS PROFILE -->
  <div id="businessProfileSection" style="display:none;">
    <h2>Business Profile</h2>
    <input id="bizName" placeholder="Business Name">
    <input id="bizContact" placeholder="Contact Info">
    <input id="bizDescription" placeholder="Description">
    <input type="file" id="bizImage">
    <br>
    <button onclick="saveBusinessProfile()">Save Profile</button>
  </div>

  <!-- Business View Section-->
<div id="businessView" style="display:none; padding:20px;">
  <button onclick="closeBusinessView()">⬅ Back</button>

  <h2 id="bizTitle"></h2>
  <img id="bizImg" style="width:200px; border-radius:10px;" />

  <p id="bizDesc"></p>
  <p id="bizContact"></p>
  <p>⭐ 4.5 Rating (coming soon)</p>

  <h3>Services</h3>
  <div class="container" id="bizServices"></div>
</div>

</div>

<script>
const BASE_URL = "https://tradeccircle-api.onrender.com";
const API_URL = BASE_URL + "/services";

let allServices = [];
let allBusinesses = [];
let editingServiceId = null;
let currentUser = null;
let token = localStorage.getItem("token");

// Decode JWT
function decodeUser() {
  if (!token) return null;
  try {
    return JSON.parse(atob(token.split(".")[1]));
  } catch {
    return null;
  }
}

// AUTH CHECK
function checkAuth() {
  token = localStorage.getItem("token");
  currentUser = decodeUser();

  if (token && currentUser) {
    document.getElementById("authSection").style.display = "none";
    document.getElementById("appSection").style.display = "block";

    // ALWAYS reset first
    document.getElementById("addServiceSection").style.display = "none";
    document.getElementById("businessProfileSection").style.display = "none";

    if (currentUser.role === "business") {
      document.getElementById("addServiceSection").style.display = "block";
      document.getElementById("businessProfileSection").style.display = "block";
    }

    loadAllData();
  } else {
    document.getElementById("authSection").style.display = "block";
    document.getElementById("appSection").style.display = "none";
  }
}

// SIGNUP
async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const role = document.getElementById("role").value;

  const res = await fetch(BASE_URL + "/signup", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password, role })
  });

  const data = await res.json();
  alert(data.message || data.error);
}

// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(BASE_URL + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    token = data.token;
    currentUser = decodeUser();
    checkAuth();
  } else {
    alert(data.error);
  }
}

// LOGOUT
function logout() {
  localStorage.removeItem("token");
  token = null;
  currentUser = null;
  checkAuth();
}

// BUSINESS PROFILE
async function saveBusinessProfile() {
  const name = document.getElementById("bizName").value;
  const contact = document.getElementById("bizContact").value;
  const description = document.getElementById("bizDescription").value;
  const file = document.getElementById("bizImage").files[0];

  let image = "";

  if (file) {
    const reader = new FileReader();
    reader.onloadend = async () => {
      image = reader.result;
      await sendProfile(name, contact, description, image);
    };
    reader.readAsDataURL(file);
  } else {
    await sendProfile(name, contact, description, image);
  }
}

async function sendProfile(name, contact, description, image) {
  const res = await fetch(BASE_URL + "/business-profile", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify({ name, contact, description, image })
  });

  const data = await res.json();
  alert(data.message || data.error);
}

// LOAD ALL DATA
async function loadAllData() {
  const [servicesRes, businessRes] = await Promise.all([
    fetch(API_URL),
    fetch(BASE_URL + "/business-profiles")
  ]);

  allServices = await servicesRes.json();
  allBusinesses = await businessRes.json();

  displayServices(allServices);
}

// DISPLAY SERVICES
function displayServices(services) {
  const container = document.getElementById("serviceList");
  container.innerHTML = "";

  services.forEach(service => {
    const isOwner = currentUser && service.userId === currentUser.id;
    const business = allBusinesses.find(b => b.userId === service.userId);

    container.innerHTML += `
      <div class="card" onclick="viewBusiness(${service.userId})">
        <img src="${service.image || 'tradecircle-logo.png'}" />
        <h3>${service.name}</h3>
        <p>$${service.price}</p>
        <p>${service.category}</p>
        <p><strong>${business ? business.name : "Unknown Business"}</strong></p>
        ${isOwner ? `
  <button onclick="event.stopPropagation(); editService(${service.id})">Edit ✏️</button>
  <button onclick="event.stopPropagation(); deleteService(${service.id})">Delete ❌</button>
` : ""}
      </div>
    `;
  });
}

// VIEW BUSINESS
function viewBusiness(userId) {
  const business = allBusinesses.find(b => b.userId === userId);
  if (!business) return alert("No business profile");

  // Hide main list
  document.getElementById("serviceList").style.display = "none";

  // Show business view
  document.getElementById("businessView").style.display = "block";

  // Fill data
  document.getElementById("bizTitle").innerText = business.name;
  document.getElementById("bizDesc").innerText = business.description;
  document.getElementById("bizContact").innerText = "Contact: " + business.contact;
  document.getElementById("bizImg").src = business.image || "tradecircle-logo.png";

  // Load that business's services
  const bizServices = allServices.filter(s => s.userId === userId);

  const container = document.getElementById("bizServices");
  container.innerHTML = "";

  bizServices.forEach(service => {
    container.innerHTML += `
      <div class="card">
        <img src="${service.image || 'tradecircle-logo.png'}" />
        <h3>${service.name}</h3>
        <p>$${service.price}</p>
        <p>${service.category}</p>
      </div>
    `;
  });
}

// Back Button Close Business View
function closeBusinessView() {
  document.getElementById("businessView").style.display = "none";
  document.getElementById("serviceList").style.display = "flex";
}

// VIEW TOGGLES
function showAll() {
  displayServices(allServices);
}

function showMine() {
  displayServices(allServices.filter(s => s.userId === currentUser.id));
}

// ADD SERVICE
async function addService() {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const category = document.getElementById("category").value;
  const file = document.getElementById("image").files[0];

  let imageData = "";

  if (file) {
    const reader = new FileReader();
    reader.onloadend = async () => {
      imageData = reader.result;
      await handleSave(name, price, category, imageData);
    };
    reader.readAsDataURL(file);
  } else {
    await handleSave(name, price, category, imageData);
  }
}

async function saveService(name, price, category, image) {
  const res = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify({ name, price, category, image })
  });

  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  loadAllData();
}

async function handleSave(name, price, category, image) {
  let res;

  if (editingServiceId) {
    // UPDATE
    res = await fetch(`${API_URL}/${editingServiceId}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ name, price, category, image })
    });

    editingServiceId = null;

    document.querySelector("#addServiceSection button").innerText = "Add";
  } else {
    // CREATE
    res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ name, price, category, image })
    });
  }

  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  // Clear form
  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("category").value = "";

  loadAllData();
}

// DELETE SERVICE
async function deleteService(id) {
  const res = await fetch(`${API_URL}/${id}`, {
    method: "DELETE",
    headers: {
      "Authorization": `Bearer ${token}`
    }
  });

  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  loadAllData();
}

// SEARCH
function searchServices() {
  const input = document.getElementById("searchInput").value.toLowerCase();

  const filtered = allServices.filter(service =>
    service.name.toLowerCase().includes(input) ||
    service.category.toLowerCase().includes(input)
  );

  displayServices(filtered);
}

// FILTER
function filterServices(category) {
  if (category === "All") {
    displayServices(allServices);
  } else {
    displayServices(allServices.filter(s => s.category === category));
  }
}

// INIT
checkAuth();
</script>

</body>
</html>
