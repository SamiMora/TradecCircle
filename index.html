<!DOCTYPE html>
<html>
<head>
  <title>TradeCircle 🌌</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f8fafc;
      color: #0f172a;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px;
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .logo {
      height: 50px;
    }

    .search-bar {
      padding: 10px;
      width: 300px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    /* LAYOUT */
    .layout {
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 200px;
      background: white;
      padding: 15px;
      height: 100vh;
      border-right: 1px solid #eee;
    }

    .sidebar button {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      background: #0ea5e9;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 20px;
    }

    /* CARDS */
    .grid {
      display: flex;
      flex-wrap: wrap;
    }

    .card {
      width: 250px;
      background: white;
      margin: 10px;
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      padding: 8px;
      background: #f97316;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      margin-top: 5px;
    }

    /* BUSINESS PAGE */
    #businessView {
      display: none;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="tradecircle-logo.png" class="logo">

  <input id="searchInput" class="search-bar" placeholder="Search services..." onkeyup="searchServices()" />

  <div>
    <input id="address" placeholder="Address">
    <input id="zip" placeholder="Zip Code">
    <button onclick="saveLocation()">Save</button>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <button onclick="filterServices('All')">All</button>
    <button onclick="filterServices('Hair')">Hair</button>
    <button onclick="filterServices('Auto')">Auto</button>
    <button onclick="filterServices('Photography')">Photography</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- AUTH -->
    <div id="authSection">
      <h2>Login / Signup</h2>
      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
      <select id="role">
        <option value="customer">Customer</option>
        <option value="business">Business</option>
      </select>
      <br>
      <button onclick="signup()">Sign Up</button>
      <button onclick="login()">Login</button>
    </div>

    <!-- APP -->
    <div id="appSection" style="display:none;">

      <div id="serviceList" class="grid"></div>

      <!-- BUSINESS VIEW -->
      <div id="businessView">
        <button onclick="closeBusiness()">⬅ Back</button>
        <h2 id="bizTitle"></h2>
        <img id="bizImg" width="200">
        <p id="bizDesc"></p>
        <p id="bizContact"></p>
        <div id="bizServices" class="grid"></div>
      </div>

      <!-- ADD SERVICE -->
      <div id="addServiceSection" style="display:none;">
        <h3>Add / Edit Service</h3>
        <input id="name" placeholder="Service name">
        <input id="price" placeholder="Price">
        <input id="category" placeholder="Category">
        <input type="file" id="image">
        <button onclick="addService()">Save</button>
      </div>

      <!-- BUSINESS PROFILE -->
      <div id="businessProfileSection" style="display:none;">
        <h3>Business Profile</h3>
        <input id="bizName" placeholder="Business Name">
        <input id="bizContactInput" placeholder="Contact">
        <input id="bizDescription" placeholder="Description">
        <input id="bizAddress" placeholder="Address">
        <input id="bizZip" placeholder="Zip Code">
        <input type="file" id="bizImage">
        <button onclick="saveBusinessProfile()">Save Profile</button>
      </div>

    </div>

  </div>
</div>

<script>
const BASE_URL = "https://tradeccircle-api.onrender.com";
const API_URL = BASE_URL + "/services";

let allServices = [];
let allBusinesses = [];
let editingServiceId = null;
let currentUser = null;
let token = localStorage.getItem("token");

// AUTH
function decodeUser() {
  if (!token) return null;
  return JSON.parse(atob(token.split(".")[1]));
}

function checkAuth() {
  token = localStorage.getItem("token");
  currentUser = decodeUser();

  if (token && currentUser) {
    document.getElementById("authSection").style.display = "none";
    document.getElementById("appSection").style.display = "block";

    if (currentUser.role === "business") {
      addServiceSection.style.display = "block";
      businessProfileSection.style.display = "block";
    }

    loadAllData();
  }
}

// AUTH ACTIONS
async function signup() {
  const res = await fetch(BASE_URL + "/signup", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value,
      role:role.value
    })
  });
  alert((await res.json()).message);
}

async function login() {
  const res = await fetch(BASE_URL + "/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });

  const data = await res.json();
  if(data.token){
    localStorage.setItem("token", data.token);
    checkAuth();
  }
}

function logout(){
  localStorage.removeItem("token");
  location.reload();
}

// LOAD
async function loadAllData() {
  const [s,b] = await Promise.all([
    fetch(API_URL),
    fetch(BASE_URL+"/business-profiles")
  ]);
  allServices = await s.json();
  allBusinesses = await b.json();
  displayServices(allServices);
}

// DISPLAY
function displayServices(services){
  serviceList.innerHTML="";

  services.forEach(s=>{
    const biz = allBusinesses.find(b=>b.userId===s.userId);

    serviceList.innerHTML+=`
    <div class="card" onclick="viewBusiness(${s.userId})">
      <img src="${s.image || 'tradecircle-logo.png'}">
      <h3>${s.name}</h3>
      <p>$${s.price}</p>
      <p>${s.category}</p>
      <strong>${biz?biz.name:"Business"}</strong>

      ${currentUser?.id===s.userId?`
        <button onclick="event.stopPropagation(); editService(${s.id})">Edit</button>
        <button onclick="event.stopPropagation(); deleteService(${s.id})">Delete</button>
      `:""}
    </div>`;
  });
}

// EDIT FIX
function editService(id){
  const s = allServices.find(x=>x.id===id);
  editingServiceId = id;

  name.value = s.name;
  price.value = s.price;
  category.value = s.category;
}

// ADD / UPDATE
async function addService(){
  const payload = {
    name:name.value,
    price:price.value,
    category:category.value,
    image:""
  };

  let url = API_URL;
  let method = "POST";

  if(editingServiceId){
    url += "/"+editingServiceId;
    method="PUT";
  }

  await fetch(url,{
    method,
    headers:{
      "Content-Type":"application/json",
      "Authorization":`Bearer ${token}`
    },
    body:JSON.stringify(payload)
  });

  editingServiceId=null;
  loadAllData();
}

// DELETE
async function deleteService(id){
  await fetch(API_URL+"/"+id,{
    method:"DELETE",
    headers:{ "Authorization":`Bearer ${token}` }
  });
  loadAllData();
}

// VIEW BUSINESS
function viewBusiness(userId){
  const biz = allBusinesses.find(b=>b.userId===userId);

  serviceList.style.display="none";
  businessView.style.display="block";

  bizTitle.innerText = biz.name;
  bizDesc.innerText = biz.description;
  bizContact.innerText = biz.contact;
  bizImg.src = biz.image || "";

  const list = allServices.filter(s=>s.userId===userId);

  bizServices.innerHTML="";
  list.forEach(s=>{
    bizServices.innerHTML+=`
      <div class="card">
        <h4>${s.name}</h4>
        <p>$${s.price}</p>
      </div>`;
  });
}

function closeBusiness(){
  businessView.style.display="none";
  serviceList.style.display="flex";
}

// SEARCH / FILTER
function searchServices(){
  const val = searchInput.value.toLowerCase();
  displayServices(allServices.filter(s=>
    s.name.toLowerCase().includes(val) ||
    s.category.toLowerCase().includes(val)
  ));
}

function filterServices(cat){
  if(cat==="All") displayServices(allServices);
  else displayServices(allServices.filter(s=>s.category===cat));
}

// LOCATION
function saveLocation(){
  localStorage.setItem("address", address.value);
  localStorage.setItem("zip", zip.value);
  alert("Location saved 📍");
}

checkAuth();
</script>

</body>
</html>
